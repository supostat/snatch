pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    rust-fmt:
      glob: "*.rs"
      run: cd src-tauri && cargo fmt --check
    rust-clippy:
      glob: "*.rs"
      run: cd src-tauri && cargo clippy -- -D warnings

pre-push:
  parallel: true
  commands:
    frontend-tests:
      run: pnpm vitest run
    rust-tests:
      run: cd src-tauri && cargo test
